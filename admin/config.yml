backend:
  name: git-gateway
  branch: main

# Media settings
media_folder: "optimized_images"
public_folder: ""

collections:
  # --------------------------------------------------
  # Car Builds — Optimized for fast editing
  # --------------------------------------------------
  - name: "builds"
    label: "Car Builds"
    folder: "src/builds"
    create: true
    slug: "{{slug}}"
    extension: "md"
    # Editor preview disabled for performance
    editor:
      preview: false
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/car.njk" }

      # === ESSENTIAL FIELDS ===
      - { label: "Title", name: "title", widget: "string", hint: "e.g. John's '67 Beetle" }

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Completed", value: "completed" }
          - { label: "In Progress", value: "in-progress" }
          - { label: "Personal Ride", value: "personal-ride" }

      - label: "Model"
        name: "model"
        widget: "select"
        options:
          - { label: "Beetle", value: "Beetle" }
          - { label: "Bus / Transporter", value: "Bus-Transporter" }
          - { label: "Karmann Ghia", value: "Karmann-Ghia" }
          - { label: "Type 3", value: "Type-3" }
          - { label: "Single Cab", value: "Single-Cab" }
          - { label: "Double Cab", value: "Double-Cab" }
          - { label: "Thing", value: "Thing" }
          - { label: "Custom / Hot Rod", value: "Custom-Hot-Rod" }
          - { label: "Porsche 356", value: "Porsche-356" }
          - { label: "Panel Van", value: "Panel-Van" }

      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Optional short description for this build"

      - label: "Hero Image"
        name: "hero_image"
        widget: "string"
        hint: "Filename from optimized_images folder (e.g. img-1234.jpg)"

      # === PHOTO GALLERY ===
      # Uses string widget instead of image widget — no thumbnails = instant load
      - label: "Photo Gallery"
        name: "gallery"
        widget: "list"
        label_singular: "Photo"
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.image}}"
        hint: "Drag to reorder. Filenames from optimized_images folder."
        fields:
          - { label: "Filename", name: "image", widget: "string" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Sort Order", name: "sort_order", widget: "hidden", default: 0 }

      # === HIDDEN/PRESERVED FIELDS ===
      - { label: "Featured", name: "featured", widget: "hidden", default: false }

  # --------------------------------------------------
  # Collection 2 — Static Pages
  # --------------------------------------------------
  - name: "pages"
    label: "Static Pages"
    files:
      - label: "About"
        name: "about"
        file: "about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Testimonials"
        name: "testimonials"
        file: "testimonials.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Contact"
        name: "contact"
        file: "contact.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
